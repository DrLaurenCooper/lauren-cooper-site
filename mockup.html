<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype V2: Ink & Connections</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --paper: #f4f4f0;
            --ink: #2D3047;
            --sage: #7B8C7C;
            --gold: #C5A059;
        }

        body {
            background-color: var(--paper);
            margin: 0;
            overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
            color: var(--ink);
        }

        /* ─── Background Texture ─── */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.4;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.5'/%3E%3C/svg%3E");
            z-index: 0;
        }

        /* ─── The Archive Container ─── */
        #archive {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* ─── Node (The Post) ─── */
        .node {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 180px;
            /* Fixed width for stability */
            text-align: center;
            transition: z-index 0s;
        }

        .node:hover {
            z-index: 100;
            /* Bring to front */
        }

        /* The Ink Dot */
        .node__dot {
            width: 12px;
            height: 12px;
            background-color: var(--ink);
            border-radius: 50%;
            filter: url(#ink-bleed);
            /* SVG Filter applied */
            transition: transform 0.3s ease;
            margin-bottom: 8px;
            position: relative;
        }

        /* The Halo (Paper indent feel) */
        .node__dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(45, 48, 71, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .node:hover .node__dot {
            transform: scale(1.5);
            background-color: var(--gold);
            /* Highlight color */
        }

        /* The Title (Always Visible) */
        .node__title {
            font-size: 1.1rem;
            line-height: 1.1;
            font-weight: 600;
            opacity: 0.7;
            /* Subtle by default */
            transition: all 0.3s ease;
            text-shadow: 0 1px 0 var(--paper);
            /* Readability over lines */
        }

        .node:hover .node__title {
            opacity: 1;
            transform: scale(1.05);
            color: var(--ink);
        }

        /* ─── Connections (SVG Lines) ─── */
        #connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
        }

        path.connection {
            fill: none;
            stroke: var(--ink);
            stroke-width: 1px;
            opacity: 0.15;
            /* Faint lines */
            transition: opacity 0.3s ease;
        }

        path.connection.active {
            opacity: 0.6;
            stroke: var(--gold);
            stroke-width: 1.5px;
        }

        /* ─── Controls ─── */
        .ui-controls {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            z-index: 200;
            font-family: sans-serif;
            font-size: 0.75rem;
            color: var(--ink);
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <!-- SVG Filters for Ink Effect -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="ink-bleed">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="8" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" />
                <feGaussianBlur stdDeviation="0.5" />
            </filter>
        </defs>
    </svg>

    <div class="texture-overlay"></div>

    <!-- The Graph -->
    <div id="archive">
        <svg id="connections"></svg>
        <!-- Nodes injected here -->
    </div>

    <div class="ui-controls">
        Prototype V2: Stable Physics • Visible Threads • Ink Texture
    </div>

    <script>
        // ─── Data ─── //
        const POSTS = [
            { id: 1, title: "Why I Love Brontë", tags: ["Literature", "Selfhood"] },
            { id: 2, title: "The Quiet Morning", tags: ["Self-care"] },
            { id: 3, title: "Reading as Healing", tags: ["Literature", "Heal"] },
            { id: 4, title: "Woolf & Water", tags: ["Literature", "Nature"] },
            { id: 5, title: "Journaling Prompts", tags: ["Selfhood"] },
            { id: 6, title: "Sacred Spaces", tags: ["Self-care", "Home"] },
            { id: 7, title: "Victorian Ghosts", tags: ["Literature", "History"] },
            { id: 8, title: "Slow Living 101", tags: ["Self-care"] },
            { id: 9, title: "The Inner Critic", tags: ["Selfhood", "Psych"] },
            { id: 10, title: "Tea & Text", tags: ["Rituals", "Literature"] }
        ];

        // ─── Engine ─── //
        const container = document.getElementById('archive');
        const svg = document.getElementById('connections');
        const width = window.innerWidth;
        const height = window.innerHeight;

        // Physics State
        let nodes = POSTS.map((post, i) => ({
            ...post,
            x: width / 2 + (Math.random() - 0.5) * 400, // Start near center
            y: height / 2 + (Math.random() - 0.5) * 400,
            vx: 0,
            vy: 0
        }));

        // Identify connections (Shared Tags)
        let edges = [];
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const shared = nodes[i].tags.filter(t => nodes[j].tags.includes(t));
                if (shared.length > 0) {
                    edges.push({ source: nodes[i], target: nodes[j], tags: shared });
                }
            }
        }

        // Create DOM Elements
        nodes.forEach(node => {
            const el = document.createElement('div');
            el.className = 'node';
            el.innerHTML = `
                <div class="node__dot"></div>
                <div class="node__title">${node.title}</div>
            `;
            container.appendChild(el);
            node.el = el;

            // Hover Interactions
            el.addEventListener('mouseenter', () => highlightConnections(node, true));
            el.addEventListener('mouseleave', () => highlightConnections(node, false));
        });

        // Create SVG Lines
        edges.forEach(edge => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.classList.add('connection');
            svg.appendChild(path);
            edge.el = path;
        });

        function highlightConnections(activeNode, isActive) {
            edges.forEach(edge => {
                if (edge.source === activeNode || edge.target === activeNode) {
                    // Check if edge element exists before toggling class
                    if (edge.el) {
                        if (isActive) edge.el.classList.add('active');
                        else edge.el.classList.remove('active');
                    }
                }
            });
        }


        // ─── Physics Loop ─── //
        function update() {
            // Constants
            const K = 0.05; // Spring stiffness
            const L = 150;  // Spring rest length
            const REPULSION = 10000;
            const CENTER_PULL = 0.005;
            const DAMPING = 0.90; // High damping prevents "flying"

            // 1. Repulsion (Nodes push apart)
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[j].x - nodes[i].x;
                    const dy = nodes[j].y - nodes[i].y;
                    const distSq = dx * dx + dy * dy + 1; // +1 avoids div by zero
                    const dist = Math.sqrt(distSq);
                    const force = REPULSION / distSq;

                    const fx = (dx / dist) * force;
                    const fy = (dy / dist) * force;

                    nodes[i].vx -= fx;
                    nodes[i].vy -= fy;
                    nodes[j].vx += fx;
                    nodes[j].vy += fy;
                }
            }

            // 2. Springs (Connections pull together)
            edges.forEach(edge => {
                const dx = edge.target.x - edge.source.x;
                const dy = edge.target.y - edge.source.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const force = (dist - L) * K;

                const fx = (dx / dist) * force;
                const fy = (dy / dist) * force;

                edge.source.vx += fx;
                edge.source.vy += fy;
                edge.target.vx -= fx;
                edge.target.vy -= fy;
            });

            // 3. Center Gravity + Update
            nodes.forEach(node => {
                // Pull to center
                node.vx += (width / 2 - node.x) * CENTER_PULL;
                node.vy += (height / 2 - node.y) * CENTER_PULL;

                // Apply constraints (keep in view)
                // (Optional: gently bounce off walls)

                // Update Position
                node.vx *= DAMPING;
                node.vy *= DAMPING;
                node.x += node.vx;
                node.y += node.vy;

                // Update DOM
                node.el.style.left = `${node.x}px`;
                node.el.style.top = `${node.y}px`;
            });

            // 4. Draw Lines (Curved)
            edges.forEach(edge => {
                const mx = (edge.source.x + edge.target.x) / 2;
                const my = (edge.source.y + edge.target.y) / 2;
                // Simple curve (quadratic bezier)
                // Control point drifts slightly for organic feel? 
                // Let's stick to straight for now for performance, or slight arc
                const d = `M ${edge.source.x} ${edge.source.y} Q ${mx} ${my} ${edge.target.x} ${edge.target.y}`;
                edge.el.setAttribute('d', d);
            });

            requestAnimationFrame(update);
        }

        update();

    </script>
</body>

</html>
